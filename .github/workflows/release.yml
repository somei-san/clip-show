name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download tarball and compute SHA256
        id: tarball
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl -fsSL "$URL" -o /tmp/release.tar.gz
          SHA256=$(sha256sum /tmp/release.tar.gz | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.tarball.outputs.sha256 }}"
          OWNER="${{ github.repository_owner }}"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${OWNER}/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula

          sed \
            -e "s/{{OWNER}}/${OWNER}/g" \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256}}/${SHA256}/g" \
            packaging/homebrew/cliip-show.rb.template > /tmp/homebrew-tap/Formula/cliip-show.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cliip-show.rb
          git commit -m "Update cliip-show to ${VERSION}"
          git push
